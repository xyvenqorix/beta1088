<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: #ffffff10;
  padding: 20px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  box-sizing: border-box;
}

button {
  background: #00ffcc;
  font-weight: bold;
  border: none;
  cursor: pointer;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>💰 Ventas</h1>

<div class="box">
  <input id="producto" placeholder="Producto">
  <input id="costo" type="number" placeholder="Costo">
  <input id="precio" type="number" placeholder="Precio">
  <button onclick="guardar()">Guardar</button>
  <div id="status"></div> </div>

<div id="lista"></div>

<script>
let supabase

window.addEventListener("load", () => {
  // Aquí Vercel inyectará tus datos desde el .env
  const url = process.env.NEXT_PUBLIC_SUPABASE_URL
  const key = process.env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY

  supabase = window.supabase.createClient(url, key)
  cargar()
})

async function guardar() {
  const p = document.getElementById("producto")
  const c = document.getElementById("costo")
  const pr = document.getElementById("precio")
  const status = document.getElementById("status")

  // Validar que no esté vacío
  if (!p.value || !c.value || !pr.value) {
    status.style.color = "red"
    status.innerText = "Error: Faltan datos"
    return
  }

  const ganancia = Number(pr.value) - Number(c.value)

  const { error } = await supabase.from("ventas").insert([
    { producto: p.value, costo: Number(c.value), precio: Number(pr.value), ganancia }
  ])

  if (error) {
    status.style.color = "red"
    status.innerText = "Error al enviar"
    console.error(error)
  } else {
    status.style.color = "#00ffcc"
    status.innerText = "Enviado correctamente"
    
    // Limpiar para la siguiente
    p.value = ""; c.value = ""; pr.value = ""
    cargar()
  }
}

async function cargar() {
  const { data, error } = await supabase.from("ventas").select("*")

  if (error) return

  if (data) {
    document.getElementById("lista").innerHTML =
      data.map(v => `<p>${v.producto} → 💸 ${v.ganancia}</p>`).join("")
  }
}
</script>

</body>
</html>
