<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  font-family: Arial;
  background: #1e1e2f;
  color: white;
  text-align: center;
  padding: 20px;
}

.box {
  background: #ffffff10;
  padding: 20px;
  border-radius: 12px;
  max-width: 400px;
  margin: auto;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
}

button {
  background: #00ffcc;
  font-weight: bold;
  border: none;
}
</style>
</head>

<body>

<h1>💰 Ventas</h1>

<div class="box">
  <input id="producto" placeholder="Producto">
  <input id="costo" type="number" placeholder="Costo">
  <input id="precio" type="number" placeholder="Precio">
  <button onclick="guardar()">Guardar</button>
</div>

<div id="lista"></div>

<script>
let supabase

// 🔥 esperar a que cargue la librería
window.addEventListener("load", () => {
  // CORRECCIÓN: Se usa 'supabase.createClient' directamente con la v2 del CDN
  supabase = supabase.createClient(
    "https://dlfgyjpsoslnorwqcfga.supabase.co",
    "sb_publishable_6RYWbnctNBOF3qXv7p9wLw_mVFrZmsY"
  )

  cargar()
})

async function guardar() {
  const producto = document.getElementById("producto").value
  const costo = Number(document.getElementById("costo").value)
  const precio = Number(document.getElementById("precio").value)
  const ganancia = precio - costo

  const { error } = await supabase.from("ventas").insert([
    { producto, costo, precio, ganancia }
  ])

  if (error) {
    alert(error.message)
  } else {
    // Limpia los campos después de guardar
    document.getElementById("producto").value = ""
    document.getElementById("costo").value = ""
    document.getElementById("precio").value = ""
    cargar()
  }
}

async function cargar() {
  const { data, error } = await supabase.from("ventas").select("*")

  if (error) {
    console.error(error)
    return
  }

  // CORRECCIÓN: Validamos que 'data' exista antes de usar .map
  if (data) {
    document.getElementById("lista").innerHTML =
      data.map(v => `<p>${v.producto} → 💸 ${v.ganancia}</p>`).join("")
  }
}
</script>

</body>
</html>
