<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { font-family: Arial; background: #1e1e2f; color: white; text-align: center; padding: 20px; }
  .box { background: #ffffff10; padding: 20px; border-radius: 12px; max-width: 400px; margin: auto; }
  input, button { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border-radius: 8px; border: none; }
  button { background: #00ffcc; font-weight: bold; cursor: pointer; color: #1e1e2f; }
  #status { margin-top: 10px; font-weight: bold; min-height: 1.2em; }
</style>
</head>
<body>

<h1>💰 Ventas</h1>
<div class="box">
  <input id="producto" placeholder="Producto">
  <input id="costo" type="number" placeholder="Costo">
  <input id="precio" type="number" placeholder="Precio">
  <button id="btn" onclick="guardar()">Guardar</button>
  <div id="status"></div>
</div>
<div id="lista"></div>

<script>
let supabase;

// 1. Detectar si las variables existen antes de empezar
const URL = "https://dlfgyjpsoslnorwqcfga.supabase.co"; // Tu URL real
const KEY = "sb_publishable_6RYWbnctNBOF3qXv7p9wLw_mVFrZmsY"; // Tu Key real

window.addEventListener("load", () => {
  try {
    // Inicialización con el objeto global de la v2
    supabase = window.supabase.createClient(URL, KEY);
    console.log("Supabase listo");
    cargar();
  } catch (e) {
    alert("Error al iniciar Supabase: " + e.message);
  }
});

async function guardar() {
  const p = document.getElementById("producto");
  const c = document.getElementById("costo");
  const pr = document.getElementById("precio");
  const status = document.getElementById("status");
  const btn = document.getElementById("btn");

  // Validación: Si están vacíos, avisar y frenar
  if (!p.value.trim() || !c.value || !pr.value) {
    status.style.color = "#ff4d4d";
    status.innerText = "❌ Rellene los campos";
    alert("Por favor, rellena todos los campos antes de guardar.");
    return;
  }

  btn.disabled = true;
  status.style.color = "white";
  status.innerText = "⏳ Enviando...";

  const ganancia = Number(pr.value) - Number(c.value);

  try {
    const { error } = await supabase.from("ventas").insert([
      { 
        producto: p.value.trim(), 
        costo: Number(c.value), 
        precio: Number(pr.value), 
        ganancia: ganancia 
      }
    ]);

    if (error) {
      status.style.color = "#ff4d4d";
      status.innerText = "❌ Error al enviar";
      alert("Error de Supabase: " + error.message);
    } else {
      status.style.color = "#00ffcc";
      status.innerText = "✅ Enviado";
      // Limpiar campos
      p.value = ""; c.value = ""; pr.value = "";
      cargar();
    }
  } catch (err) {
    alert("Fallo crítico: " + err.message);
  } finally {
    btn.disabled = false;
  }
}

async function cargar() {
  try {
    const { data, error } = await supabase.from("ventas").select("*").order('id', { ascending: false });
    if (error) throw error;
    
    if (data) {
      document.getElementById("lista").innerHTML = data
        .map(v => `<p style="border-bottom: 1px solid #333; padding: 5px;">
                    ${v.producto} → <span style="color:#00ffcc">💸 ${v.ganancia}</span>
                   </p>`)
        .join("");
    }
  } catch (e) {
    console.error("Error cargando lista:", e.message);
  }
}
</script>
</body>
</html>
